<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* POSCO 톤: 딥 네이비 #003C71 / 스카이 #00A0E9 / 쿨그레이 블루 라인 */
  :root {
    --line: #9FB3C8;
    --navy: #003C71;
    --sky: #00A0E9;
    --blue-mid: #0072CE;
    --bg-light: #EEF3F8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Malgun Gothic", "NanumGothic", "Apple SD Gothic Neo", sans-serif;
    background: #ffffff; color: #1A2B3C; padding: 2px;
  }
  /* ---- 툴바 (줌/전체화면) ---- */
  #toolbar {
    display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
    position: sticky; top: 0; z-index: 10; background: rgba(255,255,255,.95);
    padding: 4px 2px; border-radius: 8px;
  }
  #toolbar button {
    font-family: inherit; font-size: 12.5px; padding: 4px 10px;
    border: 1.5px solid #9FB3C8; border-radius: 8px; background: #fff;
    cursor: pointer; color: var(--navy);
  }
  #toolbar button:hover { background: var(--bg-light); }
  #toolbar button.active { border-color: var(--blue-mid); color: var(--blue-mid); font-weight: bold; }
  #zoomlabel { font-size: 12px; color: #4878A8; min-width: 42px; text-align: center; }

  :fullscreen { overflow: auto; background: #fff; }
  :fullscreen body { overflow: auto; }

  /* ---- 미배치 트레이 (슬림 바: 한 줄 + 가로 스크롤, 토글로 펼침) ---- */
  #tray-wrap {
    display: flex; align-items: center; gap: 8px;
    border: 1.5px dashed #8AA5BD; border-radius: 8px;
    padding: 4px 8px; margin-bottom: 10px; background: var(--bg-light);
  }
  #tray-wrap.over { border-color: var(--blue-mid); background: #E1EEFA; }
  #tray-title {
    font-size: 11.5px; font-weight: bold; color: var(--navy);
    white-space: nowrap; flex: none;
  }
  #tray {
    display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 5px;
    min-height: 28px; align-items: center; flex: 1; padding-bottom: 2px;
  }
  #tray.expanded { flex-wrap: wrap; overflow-x: visible; }
  #traytoggle {
    flex: none; font-family: inherit; font-size: 11px; padding: 2px 8px;
    border: 1px solid #9FB3C8; border-radius: 6px; background: #fff;
    cursor: pointer; color: var(--navy); white-space: nowrap;
  }
  #traytoggle:hover { background: #E1EEFA; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px; flex: none;
    background: #fff; border: 1.5px solid #4878A8; border-radius: 14px;
    padding: 2px 8px; font-size: 11.5px; cursor: grab; user-select: none;
    white-space: nowrap;
  }
  .chip.succ { border-color: var(--sky); border-width: 2px; }
  .chip.core { border-color: #6a1b9a; border-width: 2px; color: #6a1b9a; font-weight: bold; }
  .chip .lv { font-size: 9.5px; color: #fff; border-radius: 8px; padding: 1px 5px; }
  .chip:active { cursor: grabbing; }

  /* ---- 호버 프로필 팝업 (추천이유) ---- */
  #ptip {
    position: absolute; z-index: 1000; width: 308px; background: #fff;
    border: 2px solid var(--navy); border-radius: 12px; overflow: hidden;
    box-shadow: 0 12px 32px rgba(0, 20, 50, .32); display: none;
    text-align: left; pointer-events: none;
  }
  #ptip .ptip-head {
    background: linear-gradient(135deg, #002B5B 0%, #0072CE 100%);
    color: #fff; padding: 9px 12px;
    display: flex; align-items: center; gap: 10px;
  }
  #ptip .ptip-photo {
    width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex: none;
    border: 2px solid rgba(255,255,255,.75); background: #D6E4F0;
  }
  #ptip .ptip-name { font-size: 15px; font-weight: 800; }
  #ptip .ptip-sub { font-size: 11px; color: #BFDCF5; margin-top: 1px; }
  #ptip .ptip-body { padding: 9px 12px 11px; }
  #ptip .fitrow { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  #ptip .fitbar { flex: 1; height: 8px; background: #E1EAF4; border-radius: 4px; overflow: hidden; }
  #ptip .fitfill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #00A0E9, #0072CE); }
  #ptip .fitnum { font-size: 12px; font-weight: 800; color: var(--navy); white-space: nowrap; }
  #ptip .pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 10px; }
  #ptip .plabel { font-size: 10px; color: #7C93A9; margin-top: 7px; }
  #ptip .pval { font-size: 12px; color: #243B53; }
  #ptip .reason {
    background: #F0F7FD; border-left: 3px solid var(--sky); border-radius: 0 6px 6px 0;
    padding: 6px 8px; margin-top: 9px; font-size: 11.5px; color: #12406B; line-height: 1.45;
  }
  #ptip .reason b { color: var(--navy); }
  #ptip .cand {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #243B53; padding: 4px 6px; border-radius: 6px;
    background: #F4F8FC; margin-top: 4px;
  }
  #ptip .cand .sc { font-weight: 800; color: var(--blue-mid); }

  /* ---- 클릭 비교: 선택 표시 + 안내 토스트 + 비교 오버레이 ---- */
  .cmp-selected { outline: 3px solid #F9A825 !important; outline-offset: 2px; border-radius: 8px; }
  #cmphint {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 16px;
    background: #003C71; color: #fff; padding: 8px 16px; border-radius: 20px;
    font-size: 12.5px; z-index: 1200; display: none;
    box-shadow: 0 6px 18px rgba(0, 20, 50, .35); white-space: nowrap;
  }
  #cmp {
    position: fixed; inset: 0; background: rgba(8, 24, 44, .5); z-index: 1500;
    display: none; align-items: flex-start; justify-content: center;
    padding: 26px 12px; overflow: auto;
  }
  #cmp.open { display: flex; }
  #cmp .cmp-panel {
    background: #fff; border-radius: 14px; max-width: 720px; width: 100%;
    box-shadow: 0 18px 48px rgba(0, 15, 40, .45); overflow: hidden;
  }
  #cmp .cmp-head {
    background: linear-gradient(135deg, #002B5B 0%, #0072CE 100%); color: #fff;
    padding: 11px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  #cmp .cmp-title { font-weight: 800; font-size: 14.5px; }
  #cmp .cmp-close {
    background: rgba(255,255,255,.16); border: none; color: #fff; font-size: 12.5px;
    border-radius: 8px; padding: 5px 12px; cursor: pointer; font-family: inherit;
  }
  #cmp .cmp-close:hover { background: rgba(255,255,255,.3); }
  #cmp .cmp-body { display: grid; grid-template-columns: 1fr 1fr; }
  #cmp .cmp-col { padding: 14px 16px; }
  #cmp .cmp-col + .cmp-col { border-left: 1.5px solid #E1EAF4; }
  #cmp .cmp-photo {
    width: 66px; height: 66px; border-radius: 50%; object-fit: cover;
    border: 2.5px solid var(--blue-mid); background: #D6E4F0; display: block;
  }
  #cmp .cmp-name { font-size: 16px; font-weight: 800; color: #12263A; margin-top: 8px; }
  #cmp .cmp-pos { font-size: 11.5px; color: #4878A8; margin-top: 1px; }
  #cmp .cmp-win {
    display: inline-block; font-size: 10px; color: #fff; background: #2E7D32;
    border-radius: 8px; padding: 1px 7px; margin-left: 6px; vertical-align: 2px;
  }
  #cmp .plabel { font-size: 10px; color: #7C93A9; margin-top: 8px; }
  #cmp .pval { font-size: 12px; color: #243B53; }
  #cmp .fitrow { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  #cmp .fitbar { flex: 1; height: 8px; background: #E1EAF4; border-radius: 4px; overflow: hidden; }
  #cmp .fitfill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #00A0E9, #0072CE); }
  #cmp .fitnum { font-size: 12px; font-weight: 800; color: var(--navy); white-space: nowrap; }
  #cmp .reason {
    background: #F0F7FD; border-left: 3px solid var(--sky); border-radius: 0 6px 6px 0;
    padding: 6px 8px; margin-top: 10px; font-size: 11.5px; color: #12406B; line-height: 1.45;
  }
  #cmp .reason b { color: var(--navy); }

  /* ---- 전체화면 전용 TO 배지 (호스트의 플로팅 배지는 iframe 밖이라 안 보임) ---- */
  #fsbadge {
    display: none; position: fixed; right: 22px; bottom: 22px; z-index: 1400;
    background: linear-gradient(135deg, #002B5B 0%, #0072CE 100%); color: #fff;
    border-radius: 14px; padding: 9px 16px; box-shadow: 0 6px 18px rgba(0,44,91,.38);
    font-size: 12.5px; line-height: 1.55; opacity: .96; pointer-events: none;
  }
  :fullscreen #fsbadge { display: block; }
  #fsbadge .lbl { color: #A9D2F2; font-weight: 600; }
  #fsbadge b { color: #FFD54F; font-size: 15px; }

  /* ---- CSS 조직도 트리 (연결선) ---- */
  .tree { overflow-x: auto; padding: 4px 2px 14px; }
  #zoomwrap { display: inline-block; transform-origin: top left; }
  /* 연결선 기하: 부모 카드 하단 → (ul 패딩 26px: 드롭선) → 가로 레일
     → (li 패딩 26px: 세로 스터브) → 자식 카드 상단.
     li에 padding-top이 없으면 레일이 카드 상단과 겹치고 스터브가 카드 뒤로
     숨어 "엣지가 노드에 안 꽂히는" 것처럼 보인다. */
  .tree ul {
    display: flex; justify-content: center; align-items: flex-start;
    padding-top: 26px; position: relative; list-style: none;
  }
  .tree li {
    display: flex; flex-direction: column; align-items: center;
    position: relative; padding: 26px 10px 0;
  }
  .tree li::before, .tree li::after {
    content: ""; position: absolute; top: 0; right: 50%;
    border-top: 2px solid var(--line); width: 50%; height: 26px;
  }
  .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--line); }
  .tree li:only-child::before, .tree li:only-child::after { display: none; }
  .tree li:only-child { padding-top: 0; }  /* 드롭선이 카드에 바로 닿도록 */
  .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
  .tree li:last-child::before { border-right: 2px solid var(--line); border-radius: 0 6px 0 0; }
  .tree li:first-child::after { border-radius: 6px 0 0 0; }
  .tree ul ul::before {
    content: ""; position: absolute; top: 0; left: 50%;
    border-left: 2px solid var(--line); width: 0; height: 26px;
  }
  /* 루트 노드: 연결선·여백 없음. (root ul은 #zoomwrap 안에 있어
     `.tree > ul`로는 매칭되지 않는다 — 줌 래퍼 도입 때 생긴 버그) */
  #zoomwrap > ul { padding-top: 0; }
  #zoomwrap > ul > li { padding-top: 0; }
  #zoomwrap > ul > li::before, #zoomwrap > ul > li::after { display: none; }

  /* ---- 말단(리더) 계층은 세로로 쌓기 ----
     가로로 12팀이 늘어서면 '화면 맞춤' 배율이 작아져 카드가 안 보인다.
     말단만 세로 스택으로 바꾸면 전체 폭이 절반 이하로 줄어 배율이 커진다. */
  .tree ul.vstack { flex-direction: column; align-items: center; }
  .tree ul.vstack > li { padding: 12px 10px 0; }
  .tree ul.vstack > li::before {
    left: 50%; right: auto; top: 0; height: 12px; width: 0;
    border-top: none; border-right: none; border-radius: 0;
    border-left: 2px solid var(--line); display: block;
  }
  .tree ul.vstack > li::after { display: none; }

  /* ---- 명함형 카드 ---- */
  .card {
    width: 205px; background: #fff; border: 3px solid #2C4A66; border-radius: 10px;
    overflow: hidden; box-shadow: 0 2px 8px rgba(0,44,91,.14); text-align: left;
    position: relative; z-index: 1;
  }
  .card.vacant { border-style: dashed; }
  .card.over { outline: 3px solid var(--blue-mid); outline-offset: 2px;
               box-shadow: 0 0 0 6px rgba(0,114,206,.15); }
  .candidate-target { outline: 3px dashed var(--sky); outline-offset: 2px; }
  #tray-wrap.candidate-target { border-color: var(--sky); }
  .strip { color: #fff; font-size: 12.5px; font-weight: bold; padding: 5px 9px; }
  .cbody { display: flex; gap: 8px; padding: 8px 9px 4px; align-items: center; border-radius: 6px; }
  .cbody.draggable { cursor: grab; }
  .cbody.draggable:hover { background: #E8F1FA; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%; background: #D6E4F0; flex: none;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 17px; color: var(--navy);
  }
  .nm { font-size: 17px; font-weight: 800; color: #12263A; }
  .gr { font-size: 11.5px; color: #4878A8; margin-top: 1px; }
  .path { font-size: 10.5px; color: #7C93A9; padding: 0 9px 6px; }
  .roster {
    background: var(--bg-light); margin: 0 7px 7px; border-radius: 6px;
    padding: 5px 7px; display: flex; flex-direction: column; gap: 3px;
  }
  .rrow {
    font-size: 12px; color: #35506B; padding: 2px 5px; border-radius: 4px;
    background: #fff; border: 1px solid #DCE6F0; cursor: grab; user-select: none;
  }
  .rrow.core { color: #6a1b9a; font-weight: bold; border-color: #d1c4e9; }
  .rrow.vac { color: #c62828; font-weight: bold; cursor: default; background: transparent; border: 1px dashed #ef9a9a; }
  .badges { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 9px 8px; }
  .badge { font-size: 10px; color: #fff; padding: 2px 7px; border-radius: 9px; font-weight: bold; white-space: nowrap; }
  .dragging { opacity: .4; }
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
/* ---- Streamlit 커스텀 컴포넌트 프로토콜 (경량 수동 구현) ---- */
function smsg(type, data) {
  window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, data), "*");
}
function setValue(v) { smsg("streamlit:setComponentValue", { dataType: "json", value: v }); }

/* 높이는 콘텐츠 실측값으로, "바뀐 경우에만" 보고한다.
   documentElement.scrollHeight는 iframe 높이 이상으로만 측정되어
   +N씩 무한 증가(→호스트 재렌더 루프 →드래그 중 DOM 파괴)를 유발했음. */
var lastHeight = -1;
function setHeight() {
  var root = document.getElementById("root");
  var h = Math.ceil(root.getBoundingClientRect().height) + 16;
  if (h !== lastHeight) {
    lastHeight = h;
    smsg("streamlit:setFrameHeight", { height: h });
  }
}

var dragMeta = null;   // {emp, level, fromSlot}
var seq = 0;
var lastPayloadJson = null;
var trayExpanded = false;  // 미배치 트레이 펼침 상태 (렌더 간 유지)
var lockedFlags = {};      // {A: bool, B: bool} — 확정된 트랙은 드래그 잠금

/* ---- 줌: 기본은 '화면 맞춤'(가로로 긴 조직도가 한눈에 들어오게) ---- */
var zoomMode = "fit";   // "fit" | "manual"
var zoomLevel = 1.0;

function currentScale() {
  var tree = document.querySelector(".tree");
  var wrap = document.getElementById("zoomwrap");
  if (!tree || !wrap) return 1;
  if (zoomMode === "fit") {
    var natural = wrap.scrollWidth || 1;
    return Math.min(1, (tree.clientWidth - 8) / natural);
  }
  return zoomLevel;
}

function applyZoom() {
  var wrap = document.getElementById("zoomwrap");
  if (!wrap) return;
  var scale = currentScale();
  wrap.style.transform = "scale(" + scale + ")";
  var label = document.getElementById("zoomlabel");
  if (label) label.textContent = Math.round(scale * 100) + "%";
  var fitBtn = document.getElementById("fitbtn");
  if (fitBtn) fitBtn.classList.toggle("active", zoomMode === "fit");
  setHeight();
}

function zoomStep(delta) {
  zoomLevel = Math.min(1.6, Math.max(0.3, currentScale() + delta));
  zoomMode = "manual";
  applyZoom();
}

function el(tag, cls, text) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

/* ---- 호버 프로필 팝업: 카드에 마우스를 올리면 프로필+추천이유 표시 ---- */
var tipEl = null;
function ensureTip() {
  if (!tipEl) {
    tipEl = el("div", "");
    tipEl.id = "ptip";
    document.body.appendChild(tipEl);
  }
  return tipEl;
}

function fillTip(c) {
  var t = ensureTip();
  t.innerHTML = "";
  var p = c.profile || {};

  var head = el("div", "ptip-head");
  if (!c.vacant && p.photo) {
    var ph = document.createElement("img");
    ph.className = "ptip-photo";
    ph.src = p.photo;
    ph.onerror = function () { this.style.display = "none"; };  // 오프라인 폴백
    head.appendChild(ph);
  }
  var headTxt = el("div", "");
  headTxt.appendChild(el("div", "ptip-name", c.vacant ? "공석 — " + c.title : c.name + " · " + (p.grade || "")));
  headTxt.appendChild(el("div", "ptip-sub", c.vacant ? (c.path || "") : c.title + (c.path ? " · " + c.path : "")));
  head.appendChild(headTxt);
  t.appendChild(head);

  var body = el("div", "ptip-body");

  if (c.vacant) {
    body.appendChild(el("div", "plabel", "적임자 Agent 추천 후보 TOP " + ((p.cands || []).length || 0)));
    (p.cands || []).forEach(function (cd) {
      var row = el("div", "cand");
      row.appendChild(el("span", "", (cd.succ ? "★ " : "") + cd.name + " · " + cd.grade + (cd.succ ? " (후임지정)" : "")));
      var sc = el("span", "sc", cd.score + "점");
      row.appendChild(sc);
      body.appendChild(row);
    });
    if (!(p.cands || []).length) body.appendChild(el("div", "pval", "추천 가능한 후보가 없습니다."));
  } else {
    if (typeof p.fit === "number") {
      var fitrow = el("div", "fitrow");
      var bar = el("div", "fitbar");
      var fill = el("div", "fitfill");
      fill.style.width = Math.max(0, Math.min(100, p.fit)) + "%";
      bar.appendChild(fill);
      fitrow.appendChild(bar);
      fitrow.appendChild(el("span", "fitnum", "적합도 " + p.fit + "점"));
      body.appendChild(fitrow);
    }

    var grid = el("div", "pgrid");
    [["평가 추이 (22→25)", p.trend], ["다면평가 (24/25)", p.multi],
     ["세션 (부장/임원)", p.sessions], ["경력", p.career],
     ["출신교 · 전공", p.edu], ["연령", p.age]].forEach(function (kv) {
      var cell = el("div", "");
      cell.appendChild(el("div", "plabel", kv[0]));
      cell.appendChild(el("div", "pval", kv[1] || "-"));
      grid.appendChild(cell);
    });
    body.appendChild(grid);

    if (p.reasons && p.reasons.length) {
      var rs = el("div", "reason");
      var bt = el("b", "", "추천이유");
      rs.appendChild(bt);
      p.reasons.forEach(function (r) {
        var line = el("div", "", "· " + r);
        rs.appendChild(line);
      });
      body.appendChild(rs);
    }

    /* 미배치 인원: 포지션별 적합도 TOP3 → 어디로 드래그할지 바로 판단 */
    if (p.targets && p.targets.length) {
      body.appendChild(el("div", "plabel", "적임자 Agent 추천 포지션 TOP " + p.targets.length));
      p.targets.forEach(function (t) {
        var row = el("div", "cand");
        row.appendChild(el("span", "",
          (t.succ ? "★ " : "") + t.title
          + (t.succ ? " (후임지정)" : "") + (t.vacant ? " · 공석" : "")));
        row.appendChild(el("span", "sc", "적합도 " + t.score + "점"));
        body.appendChild(row);
      });
    }
    if (p.bojik) {
      body.appendChild(el("div", "plabel", "보직의견"));
      body.appendChild(el("div", "pval", p.bojik));
    }
    if (p.hr) {
      body.appendChild(el("div", "plabel", "HR검토의견"));
      body.appendChild(el("div", "pval", p.hr));
    }
  }
  t.appendChild(body);
}

function showTip(card, c) {
  fillTip(c);
  var t = ensureTip();
  t.style.display = "block";
  var r = card.getBoundingClientRect();
  var sx = window.scrollX || document.documentElement.scrollLeft || 0;
  var sy = window.scrollY || document.documentElement.scrollTop || 0;
  var w = t.offsetWidth, h = t.offsetHeight;
  var x = r.right + 10 + sx;
  if (r.right + 10 + w > document.documentElement.clientWidth) x = r.left + sx - w - 10;
  if (x < 4) x = 4;
  var y = r.top + sy;
  var rootRect = document.getElementById("root").getBoundingClientRect();
  var maxY = rootRect.bottom + sy - h - 4;
  if (y > maxY) y = Math.max(4, maxY);
  t.style.left = x + "px";
  t.style.top = y + "px";
}

function hideTip() { if (tipEl) tipEl.style.display = "none"; }

/* ---- 클릭 비교: 호버=즉시 프로필, 클릭=비교 대상 선택(2명 → 비교 패널) ---- */
var compareSel = [];        // [{emp, name, sub, title, profile}]
var suppressClick = false;  // 드래그 직후 발생하는 click 무시용

function cmpHint() {
  var hint = document.getElementById("cmphint");
  if (!hint) {
    hint = el("div", "");
    hint.id = "cmphint";
    document.body.appendChild(hint);
  }
  if (compareSel.length === 1) {
    hint.textContent = "🔍 " + compareSel[0].name + " 선택됨 — 비교할 인원을 한 명 더 클릭하세요 (같은 인원 클릭 시 해제)";
    hint.style.display = "block";
  } else {
    hint.style.display = "none";
  }
}

function clearCompare() {
  compareSel = [];
  document.querySelectorAll(".cmp-selected").forEach(function (n) { n.classList.remove("cmp-selected"); });
  var ov = document.getElementById("cmp");
  if (ov) ov.classList.remove("open");
  cmpHint();
}

var lastClickY = 0;  // 비교 패널을 클릭 지점 근처에 띄우기 위한 좌표

function makeComparable(node, entry) {
  node.addEventListener("click", function (ev) {
    if (suppressClick || dragMeta) return;
    ev.stopPropagation();
    lastClickY = ev.clientY || 0;
    var idx = -1;
    compareSel.forEach(function (s, i) { if (s.emp === entry.emp) idx = i; });
    if (idx >= 0) {
      compareSel.splice(idx, 1);
      node.classList.remove("cmp-selected");
    } else {
      if (compareSel.length >= 2) return;
      compareSel.push(entry);
      node.classList.add("cmp-selected");
      if (compareSel.length === 2) { hideTip(); showCompare(); }
    }
    cmpHint();
  });
}

function cmpColumn(entry, otherFit) {
  var p = entry.profile || {};
  var col = el("div", "cmp-col");

  if (p.photo) {
    var ph = document.createElement("img");
    ph.className = "cmp-photo";
    ph.src = p.photo;
    ph.onerror = function () { this.style.display = "none"; };
    col.appendChild(ph);
  }
  var nm = el("div", "cmp-name", entry.name + " · " + (p.grade || ""));
  if (typeof p.fit === "number" && typeof otherFit === "number" && p.fit > otherFit) {
    nm.appendChild(el("span", "cmp-win", "적합도 우위"));
  }
  col.appendChild(nm);
  col.appendChild(el("div", "cmp-pos", entry.title || ""));

  var fitrow = el("div", "fitrow");
  if (typeof p.fit === "number") {
    var bar = el("div", "fitbar");
    var fill = el("div", "fitfill");
    fill.style.width = Math.max(0, Math.min(100, p.fit)) + "%";
    bar.appendChild(fill);
    fitrow.appendChild(bar);
    fitrow.appendChild(el("span", "fitnum", "적합도 " + p.fit + "점"));
  } else {
    fitrow.appendChild(el("span", "fitnum", "미배치 (포지션별 적합도 참조)"));
  }
  col.appendChild(fitrow);

  [["평가 추이 (22→25)", p.trend], ["다면평가 (24/25)", p.multi],
   ["세션 (부장/임원)", p.sessions], ["경력", p.career],
   ["출신교 · 전공", p.edu], ["연령", p.age]].forEach(function (kv) {
    col.appendChild(el("div", "plabel", kv[0]));
    col.appendChild(el("div", "pval", kv[1] || "-"));
  });

  if (p.reasons && p.reasons.length) {
    var rs = el("div", "reason");
    rs.appendChild(el("b", "", "추천이유"));
    p.reasons.forEach(function (r) { rs.appendChild(el("div", "", "· " + r)); });
    col.appendChild(rs);
  }
  return col;
}

function showCompare() {
  var ov = document.getElementById("cmp");
  if (!ov) {
    ov = el("div", "");
    ov.id = "cmp";
    document.body.appendChild(ov);
  }
  ov.innerHTML = "";
  var panel = el("div", "cmp-panel");

  var head = el("div", "cmp-head");
  head.appendChild(el("div", "cmp-title",
    "후보 비교 — " + compareSel[0].name + " vs " + compareSel[1].name));
  var close = el("button", "cmp-close", "✕ 닫기");
  close.addEventListener("click", clearCompare);
  head.appendChild(close);
  panel.appendChild(head);

  var body = el("div", "cmp-body");
  var f0 = (compareSel[0].profile || {}).fit;
  var f1 = (compareSel[1].profile || {}).fit;
  body.appendChild(cmpColumn(compareSel[0], f1));
  body.appendChild(cmpColumn(compareSel[1], f0));
  panel.appendChild(body);

  // 클릭한 지점 근처에 패널이 보이도록 상단 여백 조정
  panel.style.marginTop = Math.max(0, lastClickY - 140) + "px";

  ov.appendChild(panel);
  ov.addEventListener("click", function (ev) { if (ev.target === ov) clearCompare(); });
  ov.classList.add("open");
}

/* ---- 위계 행 정렬: 같은 depth의 카드 높이를 통일해
   부모 카드 높이 차이로 자식 행이 어긋나는 문제를 막는다 ---- */
function alignRows() {
  var byDepth = {};
  document.querySelectorAll(".card").forEach(function (c) {
    c.style.minHeight = "";
    var d = c.dataset.depth || "0";
    (byDepth[d] = byDepth[d] || []).push(c);
  });
  Object.keys(byDepth).forEach(function (d) {
    var max = 0;
    byDepth[d].forEach(function (c) { max = Math.max(max, c.offsetHeight); });
    byDepth[d].forEach(function (c) { c.style.minHeight = max + "px"; });
  });
}

function markCandidateTargets() {
  document.querySelectorAll("[data-droptarget='1']").forEach(function (n) {
    if (dragMeta && n._accepts && n._accepts(dragMeta)) n.classList.add("candidate-target");
  });
}
function clearCandidateTargets() {
  document.querySelectorAll(".candidate-target").forEach(function (n) {
    n.classList.remove("candidate-target");
  });
}

function makeDraggable(node, emp, level, fromSlot) {
  node.draggable = true;
  node.classList.add("draggable");
  node.dataset.emp = emp;
  node.dataset.level = level;
  node.addEventListener("dragstart", function (ev) {
    dragMeta = { emp: emp, level: level, fromSlot: fromSlot || null };
    ev.dataTransfer.setData("text/plain", emp);
    ev.dataTransfer.effectAllowed = "move";
    node.classList.add("dragging");
    hideTip();  // 드래그 중에는 프로필 팝업 숨김
    markCandidateTargets();  // 놓을 수 있는 곳을 초록 점선으로 표시
  });
  node.addEventListener("dragend", function () {
    dragMeta = null;
    node.classList.remove("dragging");
    clearCandidateTargets();
    document.querySelectorAll(".over").forEach(function (x) { x.classList.remove("over"); });
    suppressClick = true;  // 드래그 직후 click이 비교 선택으로 오인되지 않게
    setTimeout(function () { suppressClick = false; }, 250);
  });
}

function makeDropTarget(node, canAccept, onDrop) {
  node.dataset.droptarget = "1";
  node._accepts = canAccept;
  node.addEventListener("dragover", function (ev) {
    if (dragMeta && canAccept(dragMeta)) { ev.preventDefault(); node.classList.add("over"); }
  });
  node.addEventListener("dragleave", function () { node.classList.remove("over"); });
  node.addEventListener("drop", function (ev) {
    ev.preventDefault();
    node.classList.remove("over");
    if (dragMeta && canAccept(dragMeta)) onDrop(dragMeta);
  });
}

function sendAction(action, emp, slot) {
  seq += 1;
  setValue({ id: Date.now() + "-" + seq, action: action, emp: emp, slot: slot || null });
}

function buildCard(c, track, depth) {
  var card = el("div", "card");
  card.dataset.slot = c.slot_id;
  card.dataset.level = c.level;
  card.dataset.depth = depth || 0;
  card.style.borderColor = c.border;
  if (c.vacant) card.classList.add("vacant");

  if (c.profile) {
    card.addEventListener("mouseenter", function () { if (!dragMeta) showTip(card, c); });
    card.addEventListener("mouseleave", hideTip);
  }

  var strip = el("div", "strip", c.title);
  strip.style.background = c.strip;
  card.appendChild(strip);

  var body = el("div", "cbody");
  body.appendChild(el("div", "avatar", c.initial));
  var info = el("div", "");
  info.appendChild(el("div", "nm", c.name));
  info.appendChild(el("div", "gr", c.sub));
  body.appendChild(info);
  if (c.emp && c.draggable) makeDraggable(body, c.emp, c.level, c.slot_id);
  if (c.emp && c.profile) {
    // 클릭 = 비교 대상 선택 (호버 프로필과 별개)
    makeComparable(body, { emp: c.emp, name: c.name, title: c.title, profile: c.profile });
  }
  card.appendChild(body);

  if (c.path) card.appendChild(el("div", "path", c.path));

  if (c.roster && c.roster.length) {
    var ro = el("div", "roster");
    c.roster.forEach(function (r) {
      if (r.vacant) {
        ro.appendChild(el("div", "rrow vac", "○ 공석"));
      } else {
        var row = el("div", "rrow" + (r.core ? " core" : ""),
                     "● " + r.name + " · " + r.grade + (r.core ? " ★" : ""));
        if (!lockedFlags.B) makeDraggable(row, r.emp, "직원", c.slot_id);
        ro.appendChild(row);
      }
    });
    card.appendChild(ro);
  }

  if (c.badges && c.badges.length) {
    var bs = el("div", "badges");
    c.badges.forEach(function (b) {
      var sp = el("span", "badge", b.text);
      sp.style.background = b.color;
      bs.appendChild(sp);
    });
    card.appendChild(bs);
  }

  /* 드롭 대상: 트랙A=모든 카드(임원/부장/리더 누구든 — 발탁 배치 허용),
     트랙B=리더 카드(직원만) */
  if (track === "A") {
    makeDropTarget(card,
      function (m) { return m.level !== "직원" && m.fromSlot !== c.slot_id; },
      function (m) { sendAction("move", m.emp, c.slot_id); });
  } else if (track === "B" && c.level === "리더") {
    makeDropTarget(card,
      function (m) { return m.level === "직원" && m.fromSlot !== c.slot_id; },
      function (m) { sendAction("team", m.emp, c.position_id); });
  }
  return card;
}

function buildNode(node, track, depth) {
  var li = el("li");
  li.appendChild(buildCard(node.card, track, depth || 0));
  if (node.children && node.children.length) {
    var ul = el("ul");
    // 자식이 전부 말단이면 세로 스택 → 조직도 가로폭 축소(화면맞춤 배율↑)
    var allLeaf = node.children.every(function (ch) {
      return !ch.children || !ch.children.length;
    });
    if (allLeaf) ul.className = "vstack";
    node.children.forEach(function (ch) { ul.appendChild(buildNode(ch, track, (depth || 0) + 1)); });
    li.appendChild(ul);
  }
  return li;
}

function buildToolbar() {
  var bar = el("div", "");
  bar.id = "toolbar";

  var minus = el("button", "", "－");
  minus.addEventListener("click", function () { zoomStep(-0.1); });
  var label = el("span", "", "100%");
  label.id = "zoomlabel";
  var plus = el("button", "", "＋");
  plus.addEventListener("click", function () { zoomStep(0.1); });
  var fit = el("button", "", "화면 맞춤");
  fit.id = "fitbtn";
  fit.addEventListener("click", function () { zoomMode = "fit"; applyZoom(); });
  var full100 = el("button", "", "100%");
  full100.addEventListener("click", function () { zoomMode = "manual"; zoomLevel = 1; applyZoom(); });

  bar.appendChild(minus); bar.appendChild(label); bar.appendChild(plus);
  bar.appendChild(fit); bar.appendChild(full100);

  if (document.fullscreenEnabled) {
    var fs = el("button", "", "⛶ 전체화면");
    fs.addEventListener("click", function () {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(function () {});
      } else {
        document.exitFullscreen();
      }
    });
    bar.appendChild(fs);
  }
  return bar;
}

function render(payload) {
  lockedFlags = payload.confirmed || {};
  var root = document.getElementById("root");
  root.innerHTML = "";

  root.appendChild(buildToolbar());

  var trayWrap = el("div", "");
  trayWrap.id = "tray-wrap";
  var title = el("div", "", "미배치 (" + payload.tray.length + ")");
  title.id = "tray-title";
  trayWrap.appendChild(title);
  var tray = el("div", "");
  tray.id = "tray";
  if (trayExpanded) tray.classList.add("expanded");
  var lockedA = payload.confirmed && payload.confirmed.A;
  var lockedB = payload.confirmed && payload.confirmed.B;
  payload.tray.forEach(function (p) {
    var chip = el("div", "chip" + (p.succ ? " succ" : "") + (p.core ? " core" : ""));
    var lv = el("span", "lv", p.level);
    lv.style.background = p.lv_color;
    chip.appendChild(lv);
    chip.appendChild(document.createTextNode(p.name + " · " + p.grade + (p.core ? " ★" : "")));
    if (p.succ) chip.title = "후임 지정: " + p.succ;
    var chipLocked = (p.level === "직원") ? lockedB : lockedA;
    if (!chipLocked) makeDraggable(chip, p.emp, p.level, null);
    if (p.profile) {
      makeComparable(chip, { emp: p.emp, name: p.name, title: "미배치 · " + p.level, profile: p.profile });
    }
    if (p.profile) {
      // 카드와 동일한 팝업을 재사용 — 미배치 인원도 프로필+추천 포지션 표시
      var pseudo = {
        vacant: false,
        name: p.name,
        title: "미배치 · " + p.level + (p.core ? " (핵심인재)" : ""),
        path: p.home || "",
        profile: p.profile,
      };
      (function (chipEl, c) {
        chipEl.addEventListener("mouseenter", function () { if (!dragMeta) showTip(chipEl, c); });
        chipEl.addEventListener("mouseleave", hideTip);
      })(chip, pseudo);
    }
    tray.appendChild(chip);
  });
  trayWrap.appendChild(tray);
  var toggle = el("button", "", trayExpanded ? "▴ 접기" : "▾ 펼치기");
  toggle.id = "traytoggle";
  toggle.addEventListener("click", function () {
    trayExpanded = !trayExpanded;
    tray.classList.toggle("expanded", trayExpanded);
    toggle.textContent = trayExpanded ? "▴ 접기" : "▾ 펼치기";
    setHeight();
  });
  trayWrap.appendChild(toggle);
  makeDropTarget(trayWrap,
    function (m) { return m.fromSlot !== null; },
    function (m) { sendAction("tray", m.emp, null); });
  root.appendChild(trayWrap);

  var treeWrap = el("div", "tree");
  var zoomWrap = el("div", "");
  zoomWrap.id = "zoomwrap";
  var rootUl = el("ul");
  payload.tree.forEach(function (n) { rootUl.appendChild(buildNode(n, payload.track, 0)); });
  zoomWrap.appendChild(rootUl);
  treeWrap.appendChild(zoomWrap);
  root.appendChild(treeWrap);

  // 전체화면 전용 TO 배지 (호스트의 플로팅 배지는 iframe 밖이라 전체화면에서 가려짐)
  if (payload.metrics) {
    var m = payload.metrics;
    var fb = el("div", "");
    fb.id = "fsbadge";
    fb.appendChild(el("span", "lbl", m.label || ""));
    fb.appendChild(document.createElement("br"));
    fb.appendChild(document.createTextNode("공석 "));
    fb.appendChild(el("b", "", String(m.vacant)));
    fb.appendChild(document.createTextNode(
      "명 · TO " + m.filled + "/" + m.total + " (충족률 " + m.fill_rate + "%)"));
    root.appendChild(fb);
  }

  clearCompare();  // 배치가 바뀌면 이전 비교 선택은 무효
  hideTip();    // 이전 렌더의 팝업 잔상 제거
  alignRows();  // 같은 위계의 카드 높이 통일 → 행 어긋남 방지
  applyZoom();  // 내부에서 setHeight() 호출
}

/* 드래그 중 트리 좌우 가장자리에 다가가면 자동 스크롤 (긴 조직도 이동 편의) */
document.addEventListener("dragover", function (ev) {
  if (!dragMeta) return;
  var tree = document.querySelector(".tree");
  if (!tree) return;
  var r = tree.getBoundingClientRect();
  var margin = 80, speed = 20;
  if (ev.clientX < r.left + margin) tree.scrollLeft -= speed;
  else if (ev.clientX > r.right - margin) tree.scrollLeft += speed;
});

window.addEventListener("message", function (e) {
  if (e.data && e.data.type === "streamlit:render") {
    /* 같은 payload면 DOM을 다시 만들지 않는다 — 호스트가 render를
       재전송해도 진행 중인 드래그가 끊기지 않도록. */
    var json = JSON.stringify(e.data.args.data);
    if (json !== lastPayloadJson) {
      lastPayloadJson = json;
      render(e.data.args.data);
    } else {
      setHeight();
    }
  }
});
window.addEventListener("resize", function () { applyZoom(); });
smsg("streamlit:componentReady", { apiVersion: 1 });
</script>
</body>
